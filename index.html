<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>TaskFlow</h1>
  <button id="darkModeToggle">🌙 Modo Oscuro</button>
</header>

<main>

<aside>
  <h2>Proyectos</h2>
  <ul>
    <li>Personal</li>
    <li>Trabajo</li>
    <li>Otros</li>
  </ul>

  <h2>Estadísticas</h2>
  <p>Total: <span id="totalTasks">0</span></p>
  <p>Completadas: <span id="completedTasks">0</span> (<span id="completedPercent">0%</span>)</p>
  <p>Pendientes: <span id="pendingTasks">0</span> (<span id="pendingPercent">0%</span>)</p>

  <!-- 📊 DONUT -->
  <div class="donut-container">
    <div class="donut" id="donutChart">
      <span id="donutText">0%</span>
    </div>

    <div class="donut-labels">
      <p>🟢 Completadas: <span id="completedLabel">0%</span></p>
      <p>🔴 Pendientes: <span id="pendingLabel">0%</span></p>
    </div>
  </div>

</aside>

<section class="tasks-section">

  <input type="text" id="taskInput" placeholder="Nueva tarea">

  <select id="categorySelect">
    <option value="Personal">Personal</option>
    <option value="Trabajo">Trabajo</option>
    <option value="Otros">Otros</option>
  </select>

  <select id="prioritySelect">
    <option value="high">Alta</option>
    <option value="medium">Media</option>
    <option value="low">Baja</option>
  </select>

  <button id="addTaskBtn">Añadir tarea</button>

  <input type="text" id="searchInput" placeholder="Buscar tarea">

  <section class="tasks" id="taskList"></section>

</section>

<script src="app.js"></script>
</body>
</html>
